name: Android Debug APK

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-android-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        working-directory: Premium Restaurant App Design (1)
        run: npm install

      - name: Build web app
        working-directory: Premium Restaurant App Design (1)
        run: npm run build

      - name: Add Android platform (if missing)
        working-directory: Premium Restaurant App Design (1)
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "android/ already exists; skipping npx cap add android"
          fi

      - name: Sync Capacitor Android project
        working-directory: Premium Restaurant App Design (1)
        run: npx cap sync android

      - name: Build Android debug APK
        working-directory: Premium Restaurant App Design (1)/android
        run: ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: Premium Restaurant App Design (1)/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
